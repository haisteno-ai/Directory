[data-theme="oled"]{

  --bg:#050215;--bg2:#0c0525;--bg3:#120835;--bgH:rgba(5,2,21,.95);--bgN:rgba(12,5,37,.95);

[data-theme="gotham"]{
  --bg:#0a1520;--bg2:#0e1e2e;--bg3:#12263a;--bgH:rgba(10,21,32,.95);--bgN:rgba(14,30,46,.95);
  --bgI:#12263a;--bgC:#162d44;--bgCA:#5a9ec8;--bgS:#0e1e2e;
  --t1:#cddcee;--t2:#6688aa;--t3:#334455;
  --ac:#5a9ec8;--acG:rgba(90,158,200,.2);--acS:rgba(90,158,200,.1);
  --bd:#1a3550;--bdL:#122840;
  --starA:#7ab3e0;--starI:#1a3550;
  --sh:0 2px 12px rgba(0,0,0,.4);
  --fD:'Rajdhani',sans-serif;--fN:'DM Sans',sans-serif;--fB:'DM Sans',sans-serif;

[data-theme="obsidian"]{
  --bg:#0a0a0a;--bg2:#111;--bg3:#181818;--bgH:rgba(10,10,10,.95);--bgN:rgba(17,17,17,.95);
  --bgI:#181818;--bgC:#1f1f1f;--bgCA:#ff6622;--bgS:#111;
  --t1:#f0ebe4;--t2:#886655;--t3:#442211;
  --ac:#ff6622;--acG:rgba(255,102,34,.2);--acS:rgba(255,102,34,.1);

}
[data-theme="gameboy"]{
  --bg:#0f380f;--bg2:#306230;--bg3:#8bac0f;--bgH:rgba(15,56,15,.95);--bgN:rgba(48,98,48,.95);
  --bgI:#306230;--bgC:#306230;--bgCA:#9bbc0f;--bgS:#306230;
  --t1:#9bbc0f;--t2:#8bac0f;--t3:#306230;
  --ac:#9bbc0f;--acG:rgba(155,188,15,.25);--acS:rgba(155,188,15,.12);
  --bd:#306230;--bdL:#1a4a1a;
  --starA:#9bbc0f;--starI:#306230;
  --sh:none;
  --fD:'Courier Prime',monospace;--fN:'Courier Prime',monospace;--fB:'Courier Prime',monospace;
  --r:0;--rs:0
}
[data-theme="synthwave"]{
  --bg:#0d0015;--bg2:#160025;--bg3:#1e0035;--bgH:rgba(13,0,21,.95);--bgN:rgba(22,0,37,.95);
  --bgI:#1e0035;--bgC:#280045;--bgCA:#ff00ff;--bgS:#160025;
  --t1:#ffe8ff;--t2:#aa44bb;--t3:#5c1870;
  --ac:#ff00ff;--acG:rgba(255,0,255,.2);--acS:rgba(255,0,255,.1);
  --bd:#3d0060;--bdL:#2a0044;
  --starA:#ff66ff;--starI:#3d0060;
  --sh:0 2px 12px rgba(200,0,200,.25);
  --fD:'Rajdhani',sans-serif;--fN:'DM Sans',sans-serif;--fB:'DM Sans',sans-serif;
  --r:4px;--rs:2px
}
[data-theme="phosphor"]{
  --bg:#0a0500;--bg2:#120900;--bg3:#1a0e00;--bgH:rgba(10,5,0,.95);--bgN:rgba(18,9,0,.95);
  --bgI:#1a0e00;--bgC:#241400;--bgCA:#ffaa00;--bgS:#120900;
  --t1:#ffcc44;--t2:#997700;--t3:#4d3300;
  --ac:#ffaa00;--acG:rgba(255,170,0,.25);--acS:rgba(255,170,0,.1);
  --bd:#3a2200;--bdL:#2a1600;
  --starA:#ffcc44;--starI:#3a2200;
  --sh:0 0 8px rgba(255,170,0,.15);
  --fD:'Courier Prime',monospace;--fN:'Courier Prime',monospace;--fB:'Courier Prime',monospace;
  --r:0;--rs:0
}
[data-theme="nightgame"]{
  --bg:#000;--bg2:#0a0a0a;--bg3:#111;--bgH:rgba(0,0,0,.95);--bgN:rgba(10,10,10,.95);
  --bgI:#111;--bgC:#1a1a1a;--bgCA:#ffcc00;--bgS:#0a0a0a;
  --t1:#fff;--t2:#aaa;--t3:#444;
  --ac:#ffcc00;--acG:rgba(255,204,0,.2);--acS:rgba(255,204,0,.1);
  --bd:#222;--bdL:#1a1a1a;
  --starA:#ffcc00;--starI:#222;
  --sh:0 2px 12px rgba(0,0,0,.5);
  --fD:'Rajdhani',sans-serif;--fN:'DM Sans',sans-serif;--fB:'DM Sans',sans-serif;
  --r:12px;--rs:8px
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;height:100%}
body{font-family:var(--fB);background:var(--bg);color:var(--t1);height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100%;height:100dvh}

.hdr{position:sticky;top:0;z-index:100;padding:calc(var(--safe-top) + 8px) 16px 10px;background:var(--bgH);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--bdL)}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.hdr-brand{flex:1;font-family:var(--fD);font-size:26px;letter-spacing:1.5px;color:var(--ac);line-height:1}
[data-theme="cocky"] .hdr-brand{text-transform:uppercase}
.hdr-brand span{color:var(--t1)}
.hdr-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--bgI);color:var(--t2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.25s;font-size:18px}
.hdr-btn:active{transform:scale(.9)}
.hdr-btn.lit{color:var(--starA)}
.srch-w{position:relative}
.srch-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none;font-size:15px}
.srch-in{width:100%;height:38px;border-radius:var(--rs);border:1.5px solid var(--bd);background:var(--bgI);color:var(--t1);font-family:var(--fB);font-size:15px;padding:0 36px;outline:none;transition:.25s}
.srch-in::placeholder{color:var(--t3)}
.srch-in:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acG)}
.srch-clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;border:none;background:var(--t3);color:var(--bg);font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}
.srch-clr.vis{display:flex}

.chip-row{display:flex;gap:6px;overflow-x:auto;padding:6px 0 2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.chip-row:empty{display:none}
.chip{flex-shrink:0;padding:4px 12px;border-radius:20px;border:1px solid var(--bd);background:var(--bgC);color:var(--t2);font-family:var(--fB);font-size:12px;font-weight:500;cursor:pointer;transition:.25s;white-space:nowrap}
.chip.on{background:var(--bgCA);color:#fff;border-color:var(--bgCA)}

.res-info{padding:10px 16px 4px;font-size:13px;color:var(--t3);font-weight:500;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.res-info strong{color:var(--ac)}
.live-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:10px;background:var(--acS);color:var(--ac)}
.live-badge .dot{width:6px;height:6px;border-radius:50%}
.live-badge .dot.pulse{background:#ff9500;animation:pulse 1s infinite}
.live-badge .dot.done{background:#34c759}
.live-badge .dot.fail{background:var(--t3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(60px + var(--safe-bottom) + 12px)}

.hero{margin:16px 16px 8px;padding:28px 24px;border-radius:var(--r);background:linear-gradient(135deg,var(--ac),#8b1528);color:#fff;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;right:-30%;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.08)}
.hero-n{font-family:var(--fD);font-size:56px;line-height:1;letter-spacing:2px}
.hero-l{font-size:14px;opacity:.85;margin-top:4px;font-weight:500}
.hero-s{font-size:12px;opacity:.6;margin-top:8px}

.cards{padding:4px 16px 16px}
.card{background:var(--bg2);border-radius:var(--r);border:1px solid var(--bdL);margin-bottom:8px;overflow:hidden;transition:.25s;box-shadow:var(--sh);animation:fu .3s ease both}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card-h{display:flex;align-items:center;padding:12px 14px;cursor:pointer;gap:12px}
.card-av{width:40px;height:40px;border-radius:50%;background:var(--acS);color:var(--ac);display:flex;align-items:center;justify-content:center;font-family:var(--fN);font-weight:700;font-size:16px;flex-shrink:0}
.card-av.live{box-shadow:0 0 0 2px var(--bg2),0 0 0 4px #34c759}
.card-i{flex:1;min-width:0}
.card-nm{font-family:var(--fN);font-weight:600;font-size:16px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-ti{font-size:13px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.card-dp{font-size:12px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-st{width:32px;height:32px;border:none;background:transparent;cursor:pointer;font-size:20px;color:var(--starI);transition:.25s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.card-st.on{color:var(--starA)}
.card-st:active{transform:scale(1.3)}
.card-b{max-height:0;overflow:hidden;transition:max-height .3s ease}
.card.exp .card-b{max-height:220px}
.card-bi{padding:0 14px 14px;display:flex;flex-direction:column;gap:8px;border-top:1px solid var(--bdL);padding-top:12px}
.card-a{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--t1);font-size:14px;padding:6px 10px;border-radius:var(--rs);transition:.25s}
.card-a:active{background:var(--acS)}
.card-ai{width:30px;height:30px;border-radius:8px;background:var(--acS);color:var(--ac);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.card-al{color:var(--t2);font-size:12px}
.card-av2{font-weight:500}
mark{background:var(--acG);color:var(--ac);border-radius:2px;padding:0 1px}

.dlist{padding:4px 16px 16px}
.ditem{display:flex;align-items:center;justify-content:space-between;padding:14px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--bdL);margin-bottom:6px;cursor:pointer;transition:.25s;box-shadow:var(--sh);animation:fu .3s ease both}
.ditem:active{background:var(--bg3);transform:scale(.98)}
.dname{font-family:var(--fN);font-weight:600;font-size:15px}
.dcnt{background:var(--acS);color:var(--ac);padding:2px 10px;border-radius:20px;font-size:13px;font-weight:600}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 32px;text-align:center}
.empty-ic{font-size:48px;margin-bottom:16px;opacity:.3}
.empty-t{font-family:var(--fN);font-size:20px;font-weight:600;margin-bottom:6px;color:var(--t2)}
.empty-d{font-size:14px;color:var(--t3);line-height:1.5}

.nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--bgN);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-top:1px solid var(--bdL);padding-bottom:var(--safe-bottom);z-index:100}
.nav-t{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 6px;border:none;background:transparent;color:var(--t3);cursor:pointer;transition:.25s;font-family:var(--fB);gap:2px}
.nav-t.on{color:var(--ac)}
.nav-ti{font-size:22px;line-height:1}
.nav-tl{font-size:10px;font-weight:600;letter-spacing:.3px}

.sh-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
.sh-ov.open{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--bgS);border-radius:20px 20px 0 0;padding:12px 24px calc(24px + var(--safe-bottom));z-index:201;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1)}
.sheet.open{transform:translateY(0)}
.sh-h{width:36px;height:4px;border-radius:2px;background:var(--t3);margin:0 auto 20px}
.sh-tt{font-family:var(--fD);font-size:24px;margin-bottom:20px;color:var(--t1);letter-spacing:1px}
.sh-opt{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--bdL);cursor:pointer}
.sh-opt:last-child{border-bottom:none}
.sh-oi{display:flex;flex-direction:column}
.sh-ol{font-weight:600;font-size:15px}
.sh-od{font-size:12px;color:var(--t3);margin-top:2px}
.sh-rad{width:22px;height:22px;border-radius:50%;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;transition:.25s}
.sh-rad.sel{border-color:var(--ac);background:var(--ac)}
.sh-rad.sel::after{content:'\2713';color:#fff;font-size:13px;font-weight:700}

.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-height:60vh;overflow-y:auto;padding-bottom:8px}
.tsw{border-radius:10px;padding:10px 6px;cursor:pointer;border:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;font-weight:600;transition:.2s;text-align:center}
.tsw:active{transform:scale(.95)}
.tsw.on{border-color:var(--ac);box-shadow:0 0 0 2px var(--acG)}
.tsw-d{width:28px;height:28px;border-radius:50%;flex-shrink:0}
.tab{display:none}.tab.on{display:block}
.content::-webkit-scrollbar{width:0}
</style>
</head>

</div>

// ===== MAIN SEARCH: offline instant + live background merge =====
function doSearch() {
  var q = query.toLowerCase();
  var cl = document.getElementById('cardList');
  var info = document.getElementById('resInfo');
  var hero = document.getElementById('hero');

  if (!q && !chip) {
    cl.innerHTML = ''; info.style.display = 'none'; hero.style.display = '';
    document.getElementById('chips').innerHTML = ''; liveId++; return;
  }
  hero.style.display = 'none';

  // 1) Offline results (instant)
  var res = DB;
  if (q) {
    res = res.filter(function(p) {
      var h = [p.name, p.title, p.department, p.email, p.room, p.phone].join(' ').toLowerCase();
      return q.split(/\s+/).every(function(w) { return h.indexOf(w) !== -1; });
    });
  }

  // Build dept chips from offline results
  if (q) {
    var dc = {};
    res.forEach(function(p) { if (p.department) dc[p.department] = (dc[p.department] || 0) + 1; });
    var sorted = Object.entries(dc).sort(function(a, b) { return b[1] - a[1]; });
    var chipsEl = document.getElementById('chips');
    if (sorted.length > 1) {
      chipsEl.innerHTML = sorted.map(function(pair) {
        var d = pair[0], c = pair[1];
        return '<button class="chip' + (chip === d ? ' on' : '') + '" onclick="togChip(\'' + esc(d).replace(/'/g, "\\'") + '\')">' + esc(d) + ' (' + c + ')</button>';
      }).join('');
    } else {
      chipsEl.innerHTML = '';
    }
  }

  if (chip) res = res.filter(function(p) { return p.department === chip; });

  // Sort: name-starts-with first, then alpha
  res.sort(function(a, b) {
    var an = a.name.toLowerCase(), bn = b.name.toLowerCase();
    var aS = an.indexOf(q) === 0, bS = bn.indexOf(q) === 0;
    if (aS && !bS) return -1;
    if (!aS && bS) return 1;
    return an.localeCompare(bn);
  });

  // Render offline results immediately
  renderResults(res, q);
  setBadge('searching');

  // 2) Fire live search in background (if query is 2+ chars)
  if (q.length >= 2) {
    fireLive(query, res);
  } else {
    setBadge('none');
  }
}

// ===== LIVE SEARCH + MERGE =====
var PROXIES = [
  function(u) { return 'https://corsproxy.io/?' + encodeURIComponent(u); },
  function(u) { return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u + '?' + 'searchterm=' + encodeURIComponent(window._lastSearchTerm || '') + '&searchtype=all&Search=Search'); }
];

function fireLive(searchTerm, offlineResults) {
  var id = ++liveId;
  window._lastSearchTerm = searchTerm;
  setBadge('searching');

  var target = 'https://www.jsu.edu/people-finder/index.html';
  var body = 'searchterm=' + encodeURIComponent(searchTerm) + '&searchtype=all&Search=Search';

  function tryProxy(idx) {
    if (id !== liveId) return;
    if (idx >= PROXIES.length) { setBadge('fail'); return; }

    var url = PROXIES[idx](target);

    var opts = idx === 0 ? {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: body
    } : { method: 'GET' };

    fetch(url, opts)
    .then(function(r) {
      if (id !== liveId) return null;
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function(html) {
      if (!html || id !== liveId) return;
      if (html.length < 200 || html.indexOf('<') === -1) throw new Error('bad response');
      mergeLiveResults(html, searchTerm, offlineResults, id);
    })
    .catch(function(err) {
      console.warn('[JAXFinder] proxy ' + idx + ' failed:', err.message);
      if (id === liveId) tryProxy(idx + 1);
    });
  }

  tryProxy(0);
}

function mergeLiveResults(html, searchTerm, offlineResults, id) {
  var livePeople = parseJSU(html);
  var seen = {};
  var merged = [];
  offlineResults.forEach(function(p) {
    var k = (p.email || p.name).toLowerCase();
    seen[k] = true;
    merged.push(p);
  });
  var newCount = 0;
  livePeople.forEach(function(p) {
    if (isStu(p.email)) return;
    var k = (p.email || p.name).toLowerCase();
    if (!seen[k]) {
      seen[k] = true;
      p._live = true;
      merged.push(p);
      newCount++;
    }
  });
  if (id !== liveId) return;
  var final = merged;
  if (chip) final = final.filter(function(p) { return p.department === chip; });
  renderResults(final, searchTerm.toLowerCase());
  setBadge('done', newCount);
}


// ===== BADGE (live search status) =====
function setBadge(state, newCount) {
  var info = document.getElementById('resInfo');
  var badge = document.getElementById('liveBadge');
  if (!badge) {
    badge = document.createElement('span');
    badge.id = 'liveBadge';
    badge.className = 'live-badge';
  }
  // Make sure badge is in the info bar
  if (!badge.parentNode || badge.parentNode !== info) {
    info.appendChild(badge);
  }

  if (state === 'searching') {
    badge.innerHTML = '<span class="dot pulse"></span>searching live\u2026';
    badge.style.display = '';
  } else if (state === 'done') {
    badge.innerHTML = '<span class="dot done"></span>live' + (newCount > 0 ? ' +' + newCount : '');
    badge.style.display = '';
    setTimeout(function() { badge.style.display = 'none'; }, 4000);
  } else if (state === 'fail') {
    badge.innerHTML = '<span class="dot fail"></span>offline only';
    badge.style.display = '';
    setTimeout(function() { badge.style.display = 'none'; }, 3000);
  } else {
    badge.style.display = 'none';
  }
}

// ===== RENDER RESULTS =====
function renderResults(results, q) {
  var cl = document.getElementById('cardList');
  var info = document.getElementById('resInfo');

  // Preserve badge element
  var badge = document.getElementById('liveBadge');

  info.innerHTML = '<strong>' + results.length + '</strong> result' + (results.length !== 1 ? 's' : '') + ' for \u201c' + esc(query) + '\u201d';
  info.style.display = '';

  // Re-attach badge
  if (badge) info.appendChild(badge);

  var cap = results.slice(0, 100);
  cl.innerHTML = cap.map(function(p, i) { return mkCard(p, q, i); }).join('');
  if (results.length > 100) {
    cl.innerHTML += '<div style="text-align:center;padding:16px;color:var(--t3);font-size:13px">Showing 100 of ' + results.length + '. Refine your search.</div>';
  }
}

// ===== PARSE JSU LIVE HTML =====
function parseJSU(html) {
  var parser = new DOMParser();
  var doc = parser.parseFromString(html, 'text/html');
  var content = doc.querySelector('.content.col12') || doc.body;
  if (!content || content.textContent.indexOf('Invalid Search Criteria') !== -1) return [];
  var blocks = content.innerHTML.split(/<hr\s*\/?>/i);
  var people = [], seen = {};

  for (var bi = 0; bi < blocks.length; bi++) {
    var b = parser.parseFromString(blocks[bi], 'text/html');
    var strong = b.querySelector('strong');
    if (!strong) continue;
    var name = strong.textContent.trim();
    if (!name || name.length < 2) continue;
    if (name.indexOf('Directory Update') !== -1 || name.indexOf('Complete the') !== -1) continue;

    var emailTag = b.querySelector('a[href^="mailto:"]');
    var email = emailTag ? emailTag.getAttribute('href').replace('mailto:', '').trim() : '';

    // Skip student accounts
    if (isStu(email)) continue;

    var key = email ? email.toLowerCase() : name.toLowerCase();
    if (seen[key]) continue;
    seen[key] = true;

    var lines = [];
    var node = strong.nextSibling;
    while (node) {
      var txt = '';
      if (node.nodeType === 3) {
        txt = node.textContent.trim();
      } else if (node.nodeType === 1) {
        if (node.tagName === 'A' && emailTag && node.getAttribute('href') === emailTag.getAttribute('href')) {
          node = node.nextSibling; continue;
        }
        txt = node.textContent.trim();
      }
      if (txt && txt !== name && txt !== email && txt.indexOf('Directory Update') === -1) {
        txt.split(/\n+/).forEach(function(l) {
          l = l.trim();
          if (l && l !== name && l !== email) lines.push(l);
        });
      }
      node = node.nextSibling;
    }

    var phone = '', room = '', title = '', dept = '';
    var rem = [];
    for (var li = 0; li < lines.length; li++) {
      var line = lines[li];
      if (/^\d{3}-\d{3}-\d{4}$/.test(line)) phone = line;
      else if (/^\d+\s+\w/.test(line) || /\b(hall|complex|building|center|house|annex|lab|floor)\b/i.test(line)) room = line;
      else rem.push(line);
    }
    if (rem.length) title = rem[0];
    if (rem.length > 1) dept = rem[1];
    if (!title && !dept && !phone && !room && !email) continue;
    people.push({ name: name, title: title, department: dept, room: room, phone: phone, email: email });
  }
  return people;
}

function togChip(d) { chip = (chip === d) ? null : d; doSearch(); }

// ===== RENDER CARD =====
function mkCard(p, q, i) {
  var fav = favs.has(p.email || p.name);
  var ini = p.name.split(' ').map(function(w) { return w[0]; }).join('').slice(0, 2).toUpperCase();
  var dl = Math.min(i * 25, 300);
  var nm = esc(p.name), ti = esc(p.title), dp = esc(p.department);

  if (q) {
    q.split(/\s+/).forEach(function(w) {
      if (w.length < 2) return;
      var re = new RegExp('(' + escRe(w) + ')', 'gi');
      nm = nm.replace(re, '<mark>$1</mark>');
      ti = ti.replace(re, '<mark>$1</mark>');
      dp = dp.replace(re, '<mark>$1</mark>');
    });
  }

  var k = (p.email || p.name).replace(/'/g, "\\'");
  var isLive = p._live;
  var acts = '';
  if (p.phone) acts += '<a class="card-a" href="tel:' + p.phone + '"><span class="card-ai">\ud83d\udcde</span><div><div class="card-al">Phone</div><div class="card-av2">' + esc(p.phone) + '</div></div></a>';
  if (p.email) acts += '<a class="card-a" href="mailto:' + p.email + '"><span class="card-ai">\u2709\ufe0f</span><div><div class="card-al">Email</div><div class="card-av2">' + esc(p.email) + '</div></div></a>';
  if (p.room) acts += '<div class="card-a"><span class="card-ai">\ud83d\udccd</span><div><div class="card-al">Location</div><div class="card-av2">' + esc(p.room) + '</div></div></div>';

  return '<div class="card" style="animation-delay:' + dl + 'ms" id="c' + i + '">' +
    '<div class="card-h" onclick="togCard(\'c' + i + '\')">' +
    '<div class="card-av' + (isLive ? ' live' : '') + '">' + ini + '</div>' +
    '<div class="card-i"><div class="card-nm">' + nm + '</div>' +
    (ti ? '<div class="card-ti">' + ti + '</div>' : '') +
    (dp ? '<div class="card-dp">' + dp + '</div>' : '') + '</div>' +
    '<button class="card-st' + (fav ? ' on' : '') + '" onclick="event.stopPropagation();togFav(\'' + k + '\',this)">' + (fav ? '\u2605' : '\u2606') + '</button>' +
    '</div><div class="card-b"><div class="card-bi">' + acts + '</div></div></div>';
}

function togCard(id) { var el = document.getElementById(id); if (el) el.classList.toggle('exp'); }

// ===== FAVORITES =====
function togFav(k, btn) {
  if (favs.has(k)) { favs.delete(k); btn.classList.remove('on'); btn.textContent = '\u2606'; }
  else { favs.add(k); btn.classList.add('on'); btn.textContent = '\u2605'; }
  localStorage.setItem('jf_f', JSON.stringify(Array.from(favs)));
  updFavBtn();
  if (tab === 'favs') renderFavs();
}
function updFavBtn() { document.getElementById('btnFav').classList.toggle('lit', favs.size > 0); }
function renderFavs() {
  var l = document.getElementById('favList');
  if (!favs.size) {
    l.innerHTML = '<div class="empty"><div class="empty-ic">\u2606</div><div class="empty-t">No Favorites Yet</div><div class="empty-d">Tap the star on any contact to save them here.</div></div>';
    return;
  }
  var fp = DB.filter(function(p) { return favs.has(p.email || p.name); });
  l.innerHTML = fp.map(function(p, i) { return mkCard(p, '', i); }).join('');
}

// ===== DEPARTMENTS =====
function buildDepts() {
  var dc = {};
  DB.forEach(function(p) { if (p.department) dc[p.department] = (dc[p.department] || 0) + 1; });
  var s = Object.entries(dc).sort(function(a, b) { return a[0].localeCompare(b[0]); });
  document.getElementById('deptList').innerHTML = s.map(function(pair, i) {
    var d = pair[0], c = pair[1];
    return '<div class="ditem" style="animation-delay:' + Math.min(i * 15, 400) + 'ms" onclick="srchDept(\'' + esc(d).replace(/'/g, "\\'") + '\')">' +
      '<span class="dname">' + esc(d) + '</span><span class="dcnt">' + c + '</span></div>';
  }).join('');
}
function srchDept(d) { si.value = d; query = d; sc.classList.add('vis'); go('search'); doSearch(); }

// ===== TABS =====
function go(t) {
  tab = t;
  document.querySelectorAll('.tab').forEach(function(e) { e.classList.remove('on'); });
  document.querySelectorAll('.nav-t').forEach(function(e) { e.classList.toggle('on', e.dataset.t === t); });
  var tabId = t === 'search' ? 'tabSearch' : t === 'depts' ? 'tabDepts' : 'tabFavs';
  document.getElementById(tabId).classList.add('on');
  if (t === 'favs') renderFavs();
  document.getElementById('cont').scrollTop = 0;
}

// ===== SETTINGS =====
function openSet() { document.getElementById('shOv').classList.add('open'); document.getElementById('sheet').classList.add('open'); }
function closeSet() { document.getElementById('shOv').classList.remove('open'); document.getElementById('sheet').classList.remove('open'); }
var THEMES=[
  {id:'cocky',name:'Stay Cocky',bg:'#100000',fg:'#f0f0f0',bdr:'#8b0000',dot:'linear-gradient(135deg,#cc0000,#3d0000)'},
  {id:'jobs',name:'Jobs',bg:'#fff',fg:'#1c1c1e',bdr:'#d1d1d6',dot:'linear-gradient(135deg,#007aff,#34c759)'},
  {id:'woz',name:'Woz',bg:'#e8e8e8',fg:'#1a1a1a',bdr:'#888',dot:'linear-gradient(135deg,#e8e8e8,#888)'},
  {id:'terminal',name:'Terminal',bg:'#000',fg:'#00ee00',bdr:'#00bb00',dot:'radial-gradient(#00ff00,#004400)'},
  {id:'oled',name:'OLED',bg:'#000',fg:'#fff',bdr:'#333',dot:'linear-gradient(135deg,#fff,#333)'},
  {id:'tesla',name:'Tesla',bg:'#080520',fg:'#e8e0ff',bdr:'#6644dd',dot:'radial-gradient(circle at 35% 35%,#fff 0%,#a87fff 40%,#1a0f4a 100%)'},
  {id:'gotham',name:'Gotham',bg:'#0e1e2e',fg:'#cddcee',bdr:'#2a4a6a',dot:'linear-gradient(135deg,#7ab3e0,#1a3550)'},
  {id:'obsidian',name:'Obsidian',bg:'#111',fg:'#f0ebe4',bdr:'#cc4400',dot:'linear-gradient(135deg,#ff6622,#441100)'},
  {id:'gameboy',name:'Game Boy',bg:'#0f380f',fg:'#9bbc0f',bdr:'#306230',dot:'linear-gradient(135deg,#9bbc0f,#306230)'},
  {id:'synthwave',name:'Synthwave',bg:'#160025',fg:'#ffe8ff',bdr:'#cc00cc',dot:'linear-gradient(135deg,#ff00ff,#440066)'},
  {id:'phosphor',name:'Phosphor',bg:'#0a0500',fg:'#ffcc44',bdr:'#cc7700',dot:'radial-gradient(#ffaa00,#3a2200)'},
  {id:'nightgame',name:'Night Game',bg:'#0a0a0a',fg:'#fff',bdr:'#ddaa00',dot:'linear-gradient(135deg,#ffcc00,#665500)'}
];
function setTheme(t, silent) {
  document.body.setAttribute('data-theme', t);
  localStorage.setItem('jf_t', t);
  renderThemeGrid();
  if (!silent) closeSet();
}
function renderThemeGrid() {
  var cur = document.body.getAttribute('data-theme') || 'cocky';
  var g = document.getElementById('themeGrid');
  if (!g) return;
  g.innerHTML = THEMES.map(function(t) {
    return '<div class="tsw' + (t.id === cur ? ' on' : '') + '" style="background:' + t.bg + ';color:' + t.fg + ';border-color:' + (t.id === cur ? t.bdr : 'transparent') + '" onclick="setTheme(\'' + t.id + '\')">' +
      '<div class="tsw-d" style="background:' + t.dot + '"></div>' + t.name + '</div>';
  }).join('');
}

// ===== UTILS =====
function esc(s) { return s ? (s + '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') : ''; }
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
</script>
